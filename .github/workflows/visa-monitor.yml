name: 🛂 Visa Slot Monitor

on:
  schedule:
    #  Every 5 minutes — works unlimited on PUBLIC repos
    #  On PRIVATE repos, change to */15 to stay within 2,000 free min/month
    - cron: '*/5 * * * *'

  # Adds a "Run workflow" button in GitHub UI for manual testing
  workflow_dispatch:

jobs:
  check:
    name: Check Visa Slots
    runs-on: ubuntu-latest

    # Needed so the job can commit state.json back to the repo
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Pull the latest commit (including state.json from last run)
          fetch-depth: 1

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Cache pip packages ────────────────────────────────────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      # ── 4. Cache Playwright Chromium (~300 MB) ───────────────────────────────
      #  This is the key optimisation — saves ~90 seconds per run after first run
      - name: Cache Playwright browser
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('requirements.txt') }}

      # ── 5. Install Python dependencies ──────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 6. Install Playwright (browser only if not cached) ──────────────────
      - name: Install Playwright browser (first time only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium

      # Always install OS-level system dependencies (fast, ~5 sec)
      - name: Install Playwright system deps
        run: playwright install-deps chromium

      # ── 7. Run the monitor (single-shot) ────────────────────────────────────
      - name: Run visa slot check
        run: python monitor.py
        env:
          # These come from GitHub Secrets — never hardcode credentials here
          TELEGRAM_ENABLED:     "true"
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}

          # Optional: uncomment and add secrets if you want WhatsApp/SMS too
          # WHATSAPP_ENABLED:       "true"
          # TWILIO_ACCOUNT_SID:     ${{ secrets.TWILIO_ACCOUNT_SID }}
          # TWILIO_AUTH_TOKEN:      ${{ secrets.TWILIO_AUTH_TOKEN }}
          # TWILIO_WHATSAPP_FROM:   "whatsapp:+14155238886"
          # TWILIO_WHATSAPP_TO:     ${{ secrets.TWILIO_WHATSAPP_TO }}

          # SMS_ENABLED:            "true"
          # TWILIO_SMS_FROM:        ${{ secrets.TWILIO_SMS_FROM }}
          # TWILIO_SMS_TO:          ${{ secrets.TWILIO_SMS_TO }}

          # 0 = single-shot mode (GitHub Actions handles the schedule loop)
          CHECK_INTERVAL: "0"

      # ── 8. Commit state.json back to repo ───────────────────────────────────
      #  This is how state persists between runs — each run reads the last
      #  committed state.json, then writes the new hash back.
      - name: Save state to repo
        run: |
          git config user.name  "Visa Monitor Bot"
          git config user.email "visa-monitor@github-actions"
          git add state.json monitor.log
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "chore: update monitor state [skip ci]"
          git push
